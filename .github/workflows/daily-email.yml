name: Daily Stock News Email

on:
  schedule:
    - cron: '0 10 * * *'   # Her gün UTC saatiyle 10:00'da çalışır
  workflow_dispatch: {}

jobs:
  send_daily_email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily email script
        env:
          STOCK_NAME: ${{ secrets.STOCK_NAME }}
          COMPANY_NAME: ${{ secrets.COMPANY_NAME }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          STOCK_API_KEY: ${{ secrets.STOCK_API_KEY }}
          STOCK_ENDPOINT: ${{ secrets.STOCK_ENDPOINT }}
          NEWS_ENDPOINT: ${{ secrets.NEWS_ENDPOINT }}
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py
